version: 2

project_name: terraform-provider-baseten

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-provider-baseten
    main: .
    binary: terraform-provider-baseten_v{{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: terraform-provider-baseten
    formats:
      - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'

release:
  draft: true

changelog:
  use: github
